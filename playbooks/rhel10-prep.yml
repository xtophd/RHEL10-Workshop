#---

- hosts: myBastion,myNodes,myLeapp
  become: true
  tasks:

    - name: "rhel10-prep : TEMPLATE /etc/motd (incomplete) on bastion"
      when: inventory_hostname in groups['myBastion']
      template:
        src: motd-incomplete.j2
        dest: /etc/motd
        owner: root
        group: root
        mode: 0644  
  
    - name: "rhel10-prep : TEMPLATE /etc/motd (generic) on other nodes"
      when: inventory_hostname not in groups['myBastion']
      template:
        src: motd-generic.j2
        dest: /etc/motd
        owner: root
        group: root
        mode: 0644  
  
    - name: "rhel10-prep : workshop file installs"
      when: inventory_hostname in groups['myBastion']
      template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      with_items:
        - {mode: '0755', src: 'workshop-tmux.j2',            dest: '/usr/local/bin/workshop-tmux.sh'}
        - {mode: '0755', src: 'workshop-pulldocs.j2',        dest: '/usr/local/bin/workshop-pulldocs.sh'}
  
    - name: "rhel10-prep: changing SSH connection timeout"
      when: inventory_hostname in groups['myBastion']
      ansible.builtin.lineinfile:
        path: "/home/{{ workshop_vars.student_name }}/.ssh/config"
        create: true
        owner: "{{ workshop_vars.student_name }}"
        group: "users"
        mode: 0400
        regexp: '^.*ConnectTimeout.*'
        line: '  ConnectTimeout 3600'



    - name: "rhel10-prep : PACKAGE install WANTED packages"
      when: inventory_hostname not in groups['myLeapp']
      dnf: 
        name: tmux,policycoreutils-python-utils,nmap-ncat,firewalld
        state: installed
      register: result
      retries: 10
      until: result is succeeded
      delay: 5
  
    - name: "rhel10-prep : dnf remove UN-WANTED packages"
      dnf: 
        name: insights-client 
        state: absent
      register: result
      retries: 10
      until: result is succeeded
      delay: 5
  
    - name: "rhel10-prep : dnf update everything to latest"
      dnf: 
        name: '*'
        state: latest
      register: result
      retries: 10
      until: result is succeeded
      delay: 5
  
    - name: "rhel10-prep : FILE remove UN-WANTED motd messages"
      file:
        path: /etc/motd.d/cockpit
        state: absent
  
    - name: "rhel10-prep : SERVICE disable and stop unwanted services"
      service: 
        name="{{ item.name }}"
        state=stopped
        enabled=no
      with_items:
        - {name: 'rhsmcertd'}



    - name: "rhel10-prep: Workshop Admin user management"
      when: workshop_vars.set_admin_password
      block:
    
          - name: "rhel10-prep : create and/or reset user"
            user: 
              name:     "{{ workshop_vars.admin_name }}" 
              password: "{{ workshop_vars.admin_password | password_hash('sha512') }}"
              state:    present

          - name: "rhel10-prep : create group"
            when: workshop_vars.admin_name != "root"
            group: 
              name:     "{{ workshop_vars.admin_name  }}" 
              state:    present
  
          - name: "rhel10-prep : add user to wheel"
            when: workshop_vars.admin_name != "root"
            user: 
              name:   "{{ workshop_vars.admin_name }}" 
              groups: "wheel"
  
  
    - name: "rhel10-prep: Workshop Student user management"
      when: workshop_vars.set_student_password
      block:
    
          - name: "rhel10-prep : create and/or reset student user"
            user: 
              name:     "{{ workshop_vars.student_name  }}" 
              password: "{{ workshop_vars.student_password | password_hash('sha512') }}"
              state:    present
  
          - name: "rhel10-prep : create student group"
            group: 
              name:     "{{ workshop_vars.student_name  }}" 
              state:    present
  
          - name: "rhel10-prep : add user to wheel"
            when: workshop_vars.admin_name != "root"
            user: 
              name:   "{{ workshop_vars.student_name }}" 
              groups: "wheel"
  
  
    - name: "rhel10-prep : Sudo Configuration"
      vars:
        t_studentName: "{{ workshop_vars.student_name }}"
      template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: 0600
      with_items:
        - {src: 'sudoers.j2', dest: '/etc/sudoers.d/rhel10-workshop'}
        - {src: 'sudoers-student.j2', dest: '/etc/sudoers.d/{{ workshop_vars.student_name }}'}



    - name: "rhel10-prep : check ssh directory permissions for root & {{ workshop_vars.student_name }}"
      file:
        path: ~{{ item }}/.ssh
        mode: "0700"
        owner: "{{ item }}"
        group: "{{ item }}"
        state: directory
      with_items:
        - "root"
        - "{{ workshop_vars.student_name }}"
  
    - name: "rhel10-prep : check ssh known_hosts permissions for root & {{ workshop_vars.student_name }}"
      file:
        path: "~{{ item }}/.ssh/known_hosts"
        mode: "0700"
        owner: "{{ item }}"
        group: "{{ item }}"
        state: touch
      with_items:
        - "root"
        - "{{ workshop_vars.student_name }}"
  
    - name: "rhel10-prep : clean up known_hosts for root"
      vars:
        p_file: "~root/.ssh/known_hosts"
      shell:
        cmd: |
          ssh-keygen -f {{ p_file }} -R {{ hostvars[item]['inventory_hostname_short'] }}
          ssh-keygen -f {{ p_file }} -R {{ hostvars[item]['inventory_hostname_short'] }}.{{ workshop_vars.network_subdomain }}
      with_items:
        - "{{ groups['myBastion'] }}"
        - "{{ groups['myNodes'] }}"
        - "{{ groups['myLeapp'] }}"
      ignore_errors: yes
  
    - name: "rhel10-prep: scan and add ssh keys to known_hosts for root"
      vars:
        p_file: "~root/.ssh/known_hosts"
      shell:
        cmd: |
          ssh-keyscan {{ hostvars[item]['inventory_hostname_short'] }} >> {{ p_file }}
          ssh-keyscan {{ hostvars[item]['inventory_hostname_short'] }}.{{ workshop_vars.network_subdomain }} >> {{ p_file }}
      with_items:
        - "{{ groups['myBastion'] }}"
        - "{{ groups['myNodes'] }}"
        - "{{ groups['myLeapp'] }}"
      ignore_errors: yes

    - name: "rhel10-prep : clean up known_hosts for {{ workshop_vars.student_name }}"
      become_user: "{{ workshop_vars.student_name }}"
      vars:
        p_file: "~{{ workshop_vars.student_name }}/.ssh/known_hosts"
      shell:
        cmd: |
          ssh-keygen -f {{ p_file }} -R {{ hostvars[item]['inventory_hostname_short'] }}
          ssh-keygen -f {{ p_file }} -R {{ hostvars[item]['inventory_hostname_short'] }}.{{ workshop_vars.network_subdomain }}
      with_items:
        - "{{ groups['myBastion'] }}"
        - "{{ groups['myNodes'] }}"
        - "{{ groups['myLeapp'] }}"
      ignore_errors: yes
  
    - name: "rhel10-prep: scan and add ssh keys to known_hosts for {{ workshop_vars.student_name }}"
      become_user: "{{ workshop_vars.student_name }}"
      vars:
        p_file: "~{{ workshop_vars.student_name }}/.ssh/known_hosts"
      shell:
        cmd: |
          ssh-keyscan {{ hostvars[item]['inventory_hostname_short'] }} >> {{ p_file }}
          ssh-keyscan {{ hostvars[item]['inventory_hostname_short'] }}.{{ workshop_vars.network_subdomain }} >> {{ p_file }}
      with_items:
        - "{{ groups['myBastion'] }}"
        - "{{ groups['myNodes'] }}"
        - "{{ groups['myLeapp'] }}"
      ignore_errors: yes
  
    - name: "rhel10-prep : workshop file installs"
      template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      with_items:
        - {mode: '0755', src: 'workshop-finish-exercise.j2', dest: '/usr/local/bin/workshop-finish-exercise.sh'}
        - {mode: '0755', src: 'workshop-finish-exercise.j2', dest: '/usr/local/bin/workshop-startex.sh'}
 

 
    - name: "rhel10-setup: root ssh keys from {{ groups['myBastion'][0] }} to all nodes"
      when:
        - inventory_hostname == groups['myBastion'][0]
      block:

          - name: "rhel10-setup : test ssh key"
            stat: 
              path: "/root/.ssh/id_rsa.pub"
            register: test_ssh_key

          - name: "rhel10-setup : create ssh key"
            command: "ssh-keygen -t rsa -b 2048 -N '' -f /root/.ssh/id_rsa"
            when: test_ssh_key.stat.exists == false

    - name: "rhel10-prep: fetch pub ssh keys from {{ groups['myBastion'][0] }}"
      delegate_to: "{{ groups['myBastion'][0] }}"
      ansible.builtin.shell:
        cmd: cat ~/.ssh/*.pub
      register: pubkeys_result

    - name: "rhel10-setup: store pub key(s) in authorized_keys"
      blockinfile:
        dest: "~/.ssh/authorized_keys"
        insertafter: EOF
        mode: 0600
        marker: "Access key root@{{groups['myBastion'][0]}}"
        owner: "root"
        group: "root"
        create: true
        content: "{{ pubkeys_result.stdout }}"



    - name: "rhel10-setup: {{ workshop_vars.student_name }} ssh keys from {{ groups['myBastion'][0] }} to all nodes"
      when:
        - inventory_hostname == groups['myBastion'][0]
      block:

          - name: "rhel10-setup : test ssh key"
            stat: 
              path: "~{{ workshop_vars.student_name }}/.ssh/id_rsa.pub"
            register: test_ssh_key

          - name: "rhel10-setup : create ssh key"
            become_user: "{{ workshop_vars.student_name }}"
            command: "ssh-keygen -t rsa -b 2048 -N '' -f ~{{ workshop_vars.student_name }}/.ssh/id_rsa"
            when: test_ssh_key.stat.exists == false

    - name: "rhel10-prep: fetch pub ssh keys from {{ groups['myBastion'][0] }}"
      delegate_to: "{{ groups['myBastion'][0] }}"
      ansible.builtin.shell:
        cmd: cat ~{{ workshop_vars.student_name }}/.ssh/*.pub
      register: pubkeys_result

    - name: "rhel10-setup: store pub key(s) in authorized_keys"
      blockinfile:
        dest: "~{{ workshop_vars.student_name }}/.ssh/authorized_keys"
        insertafter: EOF
        mode: 0600
        marker: "Access key {{ workshop_vars.student_name }}@{{groups['myBastion'][0]}}"
        owner: "{{ workshop_vars.student_name }}"
        group: "{{ workshop_vars.student_name }}"
        create: true
        content: "{{ pubkeys_result.stdout }}"


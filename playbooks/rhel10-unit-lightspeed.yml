---
- hosts: node2
  become: true
  tasks:

    - name: "rhel10-unit-lightspeed : dnf install packages"
      dnf: 
        name:  command-line-assistant,httpd
        state: installed
      register: result
      retries: 10
      until: result is succeeded
      delay: 5
      
    - name: Change endpoint to Demo.RH Sat server
      ansible.builtin.lineinfile:
        path: /etc/xdg/command-line-assistant/config.toml          # Specify the path to your file
        regexp: '^endpoint'                                        # The regular expression to match the line
        line: 'endpoint = "https://demosat-ha.infra.demo.redhat.com/api/lightspeed/v1"'            # The new content of the line
        backup: yes                                                # (Optional) creates a backup file before modification
 
    - name: Restart the clad service
      ansible.builtin.systemd_service:
        name: clad
        state: restarted
        
    - name: "rhel10-unit-lightspeed : workshop script installs"
      template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: 0744
      with_items:
        - {src: 'workshop-checkhost.j2', dest: '/usr/local/bin/workshop-lightspeed-checkhost.sh'}
        - {src: 'lightspeed-httpd-conf.j2', dest: '/etc/httpd/conf/httpd.conf'}
        
